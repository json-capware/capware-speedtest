name: CapwareSpeedtest
options:
  bundleIdPrefix: co.capware
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "QXA82BVMJ6"
    PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest

targets:
  CapwareSpeedtest:
    type: application
    platform: iOS
    sources:
      - path: CapwareSpeedtest/Sources
      - path: CapwareSpeedtest/Resources
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: CapwareSpeedtest/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: PulseWatch
        embed: true
      - sdk: WatchConnectivity.framework
        embed: false

  PulseWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PulseWatch/Sources
      # Shared with iOS — pure Foundation, compiles on watchOS unchanged
      - path: CapwareSpeedtest/Sources/Services/SpeedTestService.swift
      - path: CapwareSpeedtest/Sources/Models/TestRecord.swift
      - path: Shared/DesignTokens.swift
    resources:
      - path: PulseWatch/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest.watchkitapp
        INFOPLIST_FILE: PulseWatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "QXA82BVMJ6"
    dependencies:
      - sdk: WatchConnectivity.framework
        embed: false
