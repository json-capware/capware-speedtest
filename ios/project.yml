name: CapwareSpeedtest
options:
  bundleIdPrefix: co.capware
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest

targets:
  CapwareSpeedtest:
    type: application
    platform: iOS
    sources:
      - path: CapwareSpeedtest/Sources
      - path: CapwareSpeedtest/Resources
    settings:
      base:
        INFOPLIST_FILE: CapwareSpeedtest/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
