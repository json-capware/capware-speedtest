name: CapwareSpeedtest
packages:
  Mixpanel:
    url: https://github.com/mixpanel/mixpanel-swift
    from: "4.3.0"
  MixpanelSessionReplay:
    url: https://github.com/mixpanel/mixpanel-ios-session-replay-package
    from: "1.0.0"
options:
  bundleIdPrefix: co.capware
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    tvOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "10"
    DEVELOPMENT_TEAM: "QXA82BVMJ6"
    PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest

targets:
  CapwareSpeedtest:
    type: application
    platform: iOS
    sources:
      - path: CapwareSpeedtest/Sources
      - path: CapwareSpeedtest/Resources
      - path: Shared
    settings:
      base:
        INFOPLIST_FILE: CapwareSpeedtest/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
        MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest.macos
        CODE_SIGN_ENTITLEMENTS: CapwareSpeedtest/Resources/CapwareSpeedtest.entitlements
    dependencies:
      - target: PulseWatch
        embed: true
        platformFilter: ios
      - sdk: WatchConnectivity.framework
        embed: false
        platformFilter: ios
      - package: Mixpanel
      - package: MixpanelSessionReplay

  PulseWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: PulseWatch/Sources
      - path: PulseWatch/Resources/Assets.xcassets
      - path: PulseWatch/Resources/AppIcon.icon
      # Shared with iOS — pure Foundation, compiles on watchOS unchanged
      - path: CapwareSpeedtest/Sources/Services/SpeedTestService.swift
      - path: CapwareSpeedtest/Sources/Models/TestRecord.swift
      - path: Shared/DesignTokens.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest.watchkitapp
        INFOPLIST_FILE: PulseWatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "10"
        DEVELOPMENT_TEAM: "QXA82BVMJ6"
    dependencies:
      - sdk: WatchConnectivity.framework
        embed: false

  PulseTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseTV/Sources
      - path: PulseTV/Resources/Assets.xcassets
      # Shared logic — all pure Foundation/SwiftUI, compile cleanly on tvOS
      - path: CapwareSpeedtest/Sources/Services/SpeedTestService.swift
      - path: CapwareSpeedtest/Sources/Services/HistoryStore.swift
      - path: CapwareSpeedtest/Sources/Services/Analytics.swift
      - path: CapwareSpeedtest/Sources/Models/TestRecord.swift
      - path: CapwareSpeedtest/Sources/ViewModels/SpeedTestViewModel.swift
      - path: CapwareSpeedtest/Sources/Views/SpeedGaugeView.swift
      - path: CapwareSpeedtest/Sources/Views/ResultBadge.swift
      - path: Shared/DesignTokens.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.capware.speedtest.tv
        INFOPLIST_FILE: PulseTV/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_TV_LAUNCHIMAGE_NAME: "Top Shelf Image"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        TVOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "10"
        DEVELOPMENT_TEAM: "QXA82BVMJ6"
    dependencies:
      - package: Mixpanel
