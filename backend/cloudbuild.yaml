steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/capware-speedtest-backend:$SHORT_SHA
      - .
    dir: backend

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/capware-speedtest-backend:$SHORT_SHA

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - capware-speedtest
      - --image=gcr.io/$PROJECT_ID/capware-speedtest-backend:$SHORT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=256Mi
      - --cpu=1

images:
  - gcr.io/$PROJECT_ID/capware-speedtest-backend:$SHORT_SHA
